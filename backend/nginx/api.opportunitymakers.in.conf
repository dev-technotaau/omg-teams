# ──────────────────────────────────────────────
#  api.opportunitymakers.in — Backend API
#
#  Deployed on Render. This nginx config sits in
#  front as a reverse proxy (if self-hosted) or
#  serves as reference for Render's config.
# ──────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.opportunitymakers.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.opportunitymakers.in;

    # ──────────────────────────────────────────
    #  SSL (Let's Encrypt / Certbot)
    # ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.opportunitymakers.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.opportunitymakers.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ──────────────────────────────────────────
    #  HSTS
    # ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ──────────────────────────────────────────
    #  CORS (handled by Express, but allow preflight at nginx level)
    # ──────────────────────────────────────────
    set $cors_origin "https://teams.opportunitymakers.in";

    # ──────────────────────────────────────────
    #  Health Checks (no rate limit)
    # ──────────────────────────────────────────
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ──────────────────────────────────────────
    #  Auth Endpoints (strict rate limit)
    # ──────────────────────────────────────────
    location /api/v1/auth {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ──────────────────────────────────────────
    #  Upload Endpoints (separate limit + body size)
    # ──────────────────────────────────────────
    location /api/v1/upload {
        limit_req zone=api_upload burst=20 nodelay;
        limit_req_status 429;
        client_max_body_size 50m;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ──────────────────────────────────────────
    #  WebSocket (Socket.IO)
    # ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ──────────────────────────────────────────
    #  Swagger Docs (dev/staging only)
    # ──────────────────────────────────────────
    location /api-docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ──────────────────────────────────────────
    #  Metrics (internal only — block external)
    # ──────────────────────────────────────────
    location /metrics {
        # Only allow internal / monitoring IPs
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────
    #  All Other API Routes
    # ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Cache control — API responses should not be cached by nginx
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ──────────────────────────────────────────
    #  Block everything else
    # ──────────────────────────────────────────
    location / {
        return 404 '{"error":"Not Found"}';
        add_header Content-Type "application/json" always;
    }

    # ──────────────────────────────────────────
    #  Block sensitive files
    # ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
