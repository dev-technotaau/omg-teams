name: Deploy Backend

# Disabled — not deploying to VPS. Uncomment triggers below to re-enable.
on:
  workflow_dispatch: # manual-only
  # push:
  #   branches: [main]
  #   paths:
  #     - "backend/**"
  #     - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd backend && npm ci --legacy-peer-deps

      # §24.5 — Run database migrations as part of deployment
      - name: Run database migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([ "$STATUS" = "success" ] && echo "#36a64f" || echo "#ff0000")
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"title\":\"Backend Deploy: $STATUS\",\"text\":\"Branch: main | Commit: ${{ github.sha }}\"}]}" \
            --fail --silent --show-error || true
