version: "3.9"

# §24.6 — Production-like Docker Compose
# Optimized builds, no debug ports, Nginx reverse proxy, separate worker.

services:
  # ──────────────────────────────────────────────
  #  PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omg-teams-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-omg_teams}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omg-internal

  # ──────────────────────────────────────────────
  #  Redis (with AOF persistence)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omg-teams-redis
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 300 100
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omg-internal

  # ──────────────────────────────────────────────
  #  Backend (Express API)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omg-teams-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - omg-internal

  # ──────────────────────────────────────────────
  #  BullMQ Worker (separate entry point, same codebase)
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omg-teams-worker
    restart: always
    env_file:
      - ./backend/.env
    command: ["node", "-r", "source-map-support/register", "dist/worker-entry.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - omg-internal

  # ──────────────────────────────────────────────
  #  Frontend (Next.js)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omg-teams-frontend
    restart: always
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - omg-internal

  # ──────────────────────────────────────────────
  #  Nginx (Reverse Proxy + SSL Termination)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: omg-teams-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - omg-internal

volumes:
  postgres_data:
  redis_data:

networks:
  omg-internal:
    driver: bridge
